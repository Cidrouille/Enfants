<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calcul mental</title>
<link rel="stylesheet" href="Calcul.css">
</head>
<body>

<div class="background">
    <!-- Bulles -->
    <span class="bubble" style="--size:30px; --left:10%; --duration:12s;"></span>
    <span class="bubble" style="--size:50px; --left:70%; --duration:15s;"></span>
    <span class="bubble" style="--size:40px; --left:40%; --duration:18s;"></span>
    <span class="bubble" style="--size:25px; --left:80%; --duration:10s;"></span>

    <!-- Lumières -->
    <span class="lights" style="--size:12px; --left:15%; --duration:8s;"></span>
    <span class="lights" style="--size:10px; --left:45%; --duration:10s;"></span>
    <span class="lights" style="--size:14px; --left:70%; --duration:12s;"></span>
	
	<!-- Etoiles -->
	<span class="star" style="--size:18px; --left:15%; --duration:12s;"></span>
    <span class="star" style="--size:12px; --left:45%; --duration:8s;"></span>
	<span class="star" style="--size:25px; --left:85%; --duration:10s;"></span>
	
	<!-- Lunes -->
	<span class="lune" style="--size:18px; --left:20%; --duration:10s;"></span>
    <span class="lune" style="--size:12px; --left:50%; --duration:15s;"></span>
	<span class="lune" style="--size:25px; --left:90%; --duration:13s;"></span>
	
	<div class="shooting-star" style="--size:25px; --duration:5s; --start-left:0vw; --start-bottom:65%;">
	  <div class="trail"></div>
	  <div class="star-shape"></div>
	</div>
	<div class="shooting-star" style="--size:25px; --duration:6s; --start-left:0vw; --start-bottom:10%;">
	  <div class="trail"></div>
	  <div class="star-shape"></div>
	</div>
	<div class="shooting-star" style="--size:25px; --duration:7s; --start-left:50vw; --start-bottom:0%;">
	  <div class="trail"></div>
	  <div class="star-shape"></div>
	</div>
	
	<div id="cursor-trail"></div>
</div>

<header>
    <div class="header-left">
        <button id="goHomeBtn">Changer de jeu</button>
		<button id="changeNiveauBtn" style="display:none;">Changer de niveau</button>
    </div>
    <h1>
	  <span class="emoji">🔢</span>
      <span class="title-text">Calcul mental</span>
	</h1>
</header>

<section class="calculator-selection">
    <h2>Choisis ton type de calcul :</h2>
    <div class="types">
        <button class="calc-type" data-type="addition">Addition ➕</button>
        <button class="calc-type" data-type="subtraction">Soustraction ➖</button>
        <button class="calc-type" data-type="multiplication">Multiplication ✖️</button>
    </div>

    <div class="levels" style="display:none;">
        <h2>Choisis ton niveau :</h2>
        <div id="level-buttons"></div>
    </div>
</section>

<section class="calculator-game" style="display:none;">
    <h2>Résous le calcul :</h2>
    <div id="current-calculation" class="calculation-box">0 + 0 = ?</div>
    <input type="number" id="user-answer" placeholder="Ta réponse">
    <button id="submit-answer">Valider ✅</button>
    <div id="feedback"></div>
</section>

<script>

let selectedType = null;
let selectedLevel = null;
let correctAnswer = null;

const levelContainer = document.getElementById("level-buttons");
const levelsSection = document.querySelector(".levels");
const changeNiveauBtn = document.getElementById("changeNiveauBtn");
const goHomeBtn = document.getElementById("goHomeBtn");

const currentCalc = document.getElementById("current-calculation");
const userAnswer = document.getElementById("user-answer");
const submitBtn = document.getElementById("submit-answer");
const feedback = document.getElementById("feedback");

/* =========================
   SONS
========================= */

const matchSound = new Audio("sounds/match.mp3");

/* évite le délai au premier son */

matchSound.preload = "auto";
matchSound.volume = 0.10;

/* petit helper pour rejouer rapidement */
function playSound(sound){
    sound.currentTime = 0;
    sound.play();
}


// Bouton “Changer de jeu” renvoie à Accueil.html
goHomeBtn.addEventListener("click", () => {
    window.location.href = "Accueil.html";
});

// Sélection du type
document.querySelectorAll(".calc-type").forEach(btn => {
    btn.addEventListener("click", () => {
        selectedType = btn.dataset.type;

        if(selectedType === "multiplication"){
            // Multiplication : aucun niveau
            levelsSection.style.display = "none";
            startGame();
        } else {
            // Addition / Soustraction : afficher niveaux
            const levels = ["unit","tens","hundreds","thousands","decimal"];
            const labels = ["Unités","Dizaines","Centaines","Milliers","Nombres à virgule"];
            
            levelContainer.innerHTML = "";
            levels.forEach((lvl,i) => {
                const b = document.createElement("button");
                b.textContent = labels[i];
                b.dataset.level = lvl;
                b.addEventListener("click", () => {
                    selectedLevel = lvl;
                    startGame();
                });
                levelContainer.appendChild(b);
            });

            levelsSection.style.display = "block";
        }
    });
});

// Bouton “Changer de thème” pour revenir au menu principal
changeNiveauBtn.addEventListener("click", () => {
    selectedType = null;
    selectedLevel = null;
    document.querySelector(".calculator-selection").style.display = "block";
    document.querySelector(".calculator-game").style.display = "none";
    levelsSection.style.display = "none";
    changeNiveauBtn.style.display = "none";
});

// Lancement du jeu (pour l'instant juste affichage)
function startGame(){
    document.querySelector(".calculator-selection").style.display = "none";
    document.querySelector(".calculator-game").style.display = "block";
    changeNiveauBtn.style.display = "inline-block";

    const calcBox = document.getElementById("current-calculation");
    calcBox.textContent = `Prêt à commencer : ${selectedType} ${selectedLevel ? "(" + selectedLevel + ")" : ""}`;
}

// Fonction pour générer un nombre aléatoire selon niveau
function randomNumber(level) {
    switch(level){
        case "unit": return Math.floor(Math.random()*10);
        case "tens": return Math.floor(Math.random()*90) + 10;
        case "hundreds": return Math.floor(Math.random()*900) + 100;
        case "thousands": return Math.floor(Math.random()*9000) + 1000;
        case "decimal": return Math.round((Math.random()*99.9 + 0.1)*10)/10;
        default: return 0;
    }
}

// Fonction pour générer le calcul aléatoire
function generateCalculation() {
    let a,b,op;
    if(selectedType === "addition") op = "+";
    else if(selectedType === "subtraction") op = "-";
    else if(selectedType === "multiplication") op = "×";

    if(selectedType === "multiplication"){
        a = Math.floor(Math.random()*13);
        b = Math.floor(Math.random()*13);
    } else {
        a = randomNumber(selectedLevel);
        b = randomNumber(selectedLevel);
        if(selectedType === "subtraction" && b > a){ // pour éviter résultat négatif
            [a,b] = [b,a];
        }
    }

    currentCalc.textContent = `${a} ${op} ${b} = ?`;

    switch(op){
        case "+": correctAnswer = Math.round((a+b)*10)/10; break;
        case "-": correctAnswer = Math.round((a-b)*10)/10; break;
        case "×": correctAnswer = Math.round(a*b*10)/10; break;
    }

    userAnswer.value = "";
    userAnswer.focus();
    feedback.textContent = "";
}

// Validation de la réponse
submitBtn.addEventListener("click", () => {
    const userVal = parseFloat(userAnswer.value);
    if(userVal === correctAnswer){
		playSound(matchSound);
        feedback.textContent = "✅ Bravo !";
        generateCalculation(); // nouveau calcul
    } else {
        feedback.textContent = "❌ Essaie encore !";
        userAnswer.focus();
    }
});

// Écouter la touche Entrée pour valider
userAnswer.addEventListener("keydown", (e) => {
    if(e.key === "Enter") {
        submitBtn.click(); // déclenche le même code que le bouton
    }
});

// Modifier startGame pour lancer le premier calcul
function startGame(){
    document.querySelector(".calculator-selection").style.display = "none";
    document.querySelector(".calculator-game").style.display = "block";
    changeNiveauBtn.style.display = "inline-block";

    // Lancer le premier calcul
    generateCalculation();
}

// TRAÎNÉE ARC-EN-CIEL FLUIDE LÉGÈRE
const trailCanvas = document.createElement("canvas");
trailCanvas.style.position = "fixed";
trailCanvas.style.top = "0";
trailCanvas.style.left = "0";
trailCanvas.style.pointerEvents = "none";
trailCanvas.style.zIndex = "9999";
document.body.appendChild(trailCanvas);

const ctx = trailCanvas.getContext("2d");
let width = window.innerWidth;
let height = window.innerHeight;
trailCanvas.width = width;
trailCanvas.height = height;

window.addEventListener("resize", () => {
    width = window.innerWidth;
    height = window.innerHeight;
    trailCanvas.width = width;
    trailCanvas.height = height;
});

let mouseX = width/2;
let mouseY = height/2;
let lastMove = Date.now();

document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    lastMove = Date.now();
});

const trail = [];
const maxTrail = 10; // moins de points => traînée plus courte

function animateTrailCanvas() {
    ctx.clearRect(0,0,width,height);

    // ajoute la nouvelle position
    trail.push({x: mouseX, y: mouseY, time: Date.now()});
    if(trail.length > maxTrail) trail.shift();

    for(let i=0; i<trail.length-1; i++){
        const p = trail[i];
        const next = trail[i+1];
        const alpha = 0.8 * (1 - i / trail.length); // plus subtil

        const hue = (i*30 + Date.now()/10)%360;
        ctx.strokeStyle = `hsla(${hue},100%,60%,${alpha})`;
        ctx.lineWidth = 6*(alpha); 

        // effet de flou léger
        ctx.shadowBlur = 8;
        ctx.shadowColor = ctx.strokeStyle;

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(next.x, next.y);
        ctx.stroke();
    }

    // efface si souris immobile > 300ms
    if(Date.now() - lastMove > 300){
        trail.length = 0;
    }

    requestAnimationFrame(animateTrailCanvas);
}

animateTrailCanvas();

</script>

</body>
</html>
