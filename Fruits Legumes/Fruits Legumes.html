<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu des Fruit & Légumes</title>
    <link rel="stylesheet" href="Fruits Legumes.css">
</head>
<body>

<div class="background">
     <!-- Bulles -->
    <span class="bubble" style="--size:30px; --left:10%; --duration:12s;"></span>
    <span class="bubble" style="--size:50px; --left:70%; --duration:15s;"></span>
    <span class="bubble" style="--size:40px; --left:40%; --duration:18s;"></span>
    <span class="bubble" style="--size:25px; --left:80%; --duration:10s;"></span>

    <!-- Lumières -->
    <span class="lights" style="--size:12px; --left:15%; --duration:8s;"></span>
    <span class="lights" style="--size:10px; --left:45%; --duration:10s;"></span>
    <span class="lights" style="--size:14px; --left:70%; --duration:12s;"></span>
	
	<!-- Etoiles -->
	<span class="star" style="--size:18px; --left:15%; --duration:12s;"></span>
    <span class="star" style="--size:12px; --left:45%; --duration:8s;"></span>
	<span class="star" style="--size:25px; --left:85%; --duration:10s;"></span>
	
	<!-- Lunes -->
	<span class="lune" style="--size:18px; --left:20%; --duration:10s;"></span>
    <span class="lune" style="--size:12px; --left:50%; --duration:15s;"></span>
	<span class="lune" style="--size:25px; --left:90%; --duration:13s;"></span>
	
	<div class="shooting-star" style="--size:25px; --duration:5s; --start-left:0vw; --start-bottom:65%;">
	  <div class="trail"></div>
	  <div class="star-shape"></div>
	</div>
	<div class="shooting-star" style="--size:25px; --duration:6s; --start-left:0vw; --start-bottom:10%;">
	  <div class="trail"></div>
	  <div class="star-shape"></div>
	</div>
	<div class="shooting-star" style="--size:25px; --duration:7s; --start-left:50vw; --start-bottom:0%;">
	  <div class="trail"></div>
	  <div class="star-shape"></div>
	</div>
	
	<div id="cursor-trail"></div>
</div>

<header>
    <div class="header-left">
        <button id="goHomeBtn">Changer de jeu</button>
        <button id="changeThemeBtn" style="display:none;">Changer de thème</button>
    </div>
    <h1>
	  <span class="emoji">🥦</span>
      <span class="title-text">Jeu des Fruits et Légumes</span>
	</h1>
</header>

<main>
    <!-- Menu des thèmes -->
    <div id="themeMenu">
        <div class="theme-card" data-theme="fruit">
            <span>🍓</span><p>Fruits</p>
        </div>
        <div class="theme-card" data-theme="legume">
            <span>🥕</span><p>Légumes</p>
        </div>
    </div>

    <!-- Zone de jeu -->
    <div id="gameArea" style="display:none;">
        <div id="fruitDisplay">
            <img id="fruitImg" src="" alt="fruit" />
        </div>

        <div class="choices">
            <button class="choice"></button>
            <button class="choice"></button>
            <button class="choice"></button>
        </div>

        <p id="message"></p>
        <button id="nextBtn">fruit suivant →</button>
    </div>
</main>

<script>
/* ===== DONNEES ===== */
const fruit = [
    {name: "Ananas", img: "images/Fruit/ananas.png", theme: "fruit"},
	{name: "Avocat", img: "images/Fruit/avocat.png", theme: "fruit"},
	{name: "Banane", img: "images/Fruit/banane.png", theme: "fruit"},
	{name: "Litchi", img: "images/Fruit/litchi.png", theme: "fruit"},
	{name: "Cerise", img: "images/Fruit/cerise.png", theme: "fruit"},
	{name: "Citron", img: "images/Fruit/citron.png", theme: "fruit"},
	{name: "Durian", img: "images/Fruit/durian.png", theme: "fruit"},
	{name: "Fraise", img: "images/Fruit/fraise.png", theme: "fruit"},
	{name: "Fruit du dragon", img: "images/Fruit/fruit du dragon.png", theme: "fruit"},
	{name: "Goyave", img: "images/Fruit/goyave.png", theme: "fruit"},
	{name: "Grenade", img: "images/Fruit/grenade.png", theme: "fruit"},
	{name: "Kiwi", img: "images/Fruit/kiwi.png", theme: "fruit"},
	{name: "Mangue", img: "images/Fruit/mangue.png", theme: "fruit"},
	{name: "melon", img: "images/Fruit/melon.png", theme: "fruit"},
	{name: "Orange", img: "images/Fruit/orange.png", theme: "fruit"},
	{name: "papaye", img: "images/Fruit/papaye.png", theme: "fruit"},
	{name: "Pastèque", img: "images/Fruit/pasteque.png", theme: "fruit"},
	{name: "Poire", img: "images/Fruit/poire.png", theme: "fruit"},
	{name: "Pomme", img: "images/Fruit/pomme.png", theme: "fruit"},
	{name: "Raisin", img: "images/Fruit/raisin.png", theme: "fruit"},
	{name: "Tomate", img: "images/Fruit/tomate.png", theme: "fruit"},
	{name: "Abricot", img: "images/Fruit/abricot.png", theme: "fruit"},
	{name: "Pêche", img: "images/Fruit/peche.png", theme: "fruit"},
	{name: "Prune", img: "images/Fruit/prune.png", theme: "fruit"},
	{name: "Figue", img: "images/Fruit/figue.png", theme: "fruit"},
	{name: "Framboise", img: "images/Fruit/framboise.png", theme: "fruit"},
	{name: "Myrtille", img: "images/Fruit/myrtille.png", theme: "fruit"},
	{name: "Noix de coco", img: "images/Fruit/noix de coco.png", theme: "fruit"},
	{name: "Carambole", img: "images/Fruit/carambole.png", theme: "fruit"},
	{name: "Noix", img: "images/Fruit/noix.png", theme: "fruit"},
	{name: "Noisette", img: "images/Fruit/noisette.png", theme: "fruit"},
	{name: "Groseille", img: "images/Fruit/groseille.png", theme: "fruit"},
	
	{name: "Ail", img: "images/Legume/ail.png", theme: "legume"},
	{name: "Aubergine", img: "images/Legume/aubergine.png", theme: "legume"},
	{name: "Brocoli", img: "images/Legume/brocoli.png", theme: "legume"},
	{name: "Poivron jaune", img: "images/Legume/poivron jaune.png", theme: "legume"},
	{name: "Poivron rouge", img: "images/Legume/poivron rouge.png", theme: "legume"},
	{name: "Carotte", img: "images/Legume/carotte.png", theme: "legume"},
	{name: "Céleri", img: "images/Legume/celeri.png", theme: "legume"},
	{name: "Champignon", img: "images/Legume/champignon.png", theme: "legume"},
	{name: "Choux fleur", img: "images/Legume/choux fleur.png", theme: "legume"},
	{name: "Choux rouge", img: "images/Legume/choux rouge.png", theme: "legume"},
	{name: "Citrouille", img: "images/Legume/citrouille.png", theme: "legume"},
	{name: "Concombre", img: "images/Legume/concombre.png", theme: "legume"},
	{name: "Epinard", img: "images/Legume/epinard.png", theme: "legume"},
	{name: "Laitue", img: "images/Legume/laitue.png", theme: "legume"},
	{name: "Maïs", img: "images/Legume/mais.png", theme: "legume"},
	{name: "Navet blanc", img: "images/Legume/navet blanc.png", theme: "legume"},
	{name: "Navet", img: "images/Legume/navet.png", theme: "legume"},
	{name: "Oignon", img: "images/Legume/oignon.png", theme: "legume"},
	{name: "Oignon rouge", img: "images/Legume/oignon rouge.png", theme: "legume"},
	{name: "Petit poid", img: "images/Legume/petit poid.png", theme: "legume"},
	{name: "Piment", img: "images/Legume/piment.png", theme: "legume"},
	{name: "Poireau", img: "images/Legume/poireau.png", theme: "legume"},
	{name: "Pomme de terre", img: "images/Legume/pomme de terre.png", theme: "legume"},
	{name: "Betterave", img: "images/Legume/betterave.png", theme: "legume"},
	{name: "Artichaut", img: "images/Legume/artichaut.png", theme: "legume"},
	{name: "Asperge", img: "images/Legume/asperge.png", theme: "legume"},
	{name: "Butternut", img: "images/Legume/butternut.png", theme: "legume"},
	{name: "Courgette", img: "images/Legume/courgette.png", theme: "legume"},
	{name: "Endive", img: "images/Legume/endive.png", theme: "legume"},
	{name: "Fenouil", img: "images/Legume/fenouil.png", theme: "legume"},
	{name: "Patate douce", img: "images/Legume/patate douce.png", theme: "legume"}
];

/* Fond par thème */
const themeBackgrounds = {
    fruit: "linear-gradient(135deg, #caffbf, #9bf6a0, #52b788)",
    legume: "linear-gradient(135deg, #caffbf, #9bf6a0, #52b788)"
};

/* ===== ELEMENTS ===== */
const themeCards = document.querySelectorAll(".theme-card");
const themeMenu = document.getElementById("themeMenu");
const gameArea = document.getElementById("gameArea");
const fruitImg = document.getElementById("fruitImg");
const buttons = document.querySelectorAll(".choice");
const message = document.getElementById("message");
const nextBtn = document.getElementById("nextBtn");
const goHomeBtn = document.getElementById("goHomeBtn");
const changeThemeBtn = document.getElementById("changeThemeBtn");

let currentFruit = [];
let correctFruit;

function shuffle(array){ return array.sort(() => Math.random()-0.5); }

/* ===== CLICK SUR THEME ===== */
themeCards.forEach(card => {
    card.onclick = () => {
        const theme = card.dataset.theme;
        currentFruit = fruit.filter(a => a.theme === theme);
        if(currentFruit.length === 0){
            alert("Aucun fruit pour ce thème !");
            return;
        }

        // Appliquer le fond du thème
        document.body.style.background = themeBackgrounds[theme];

        themeMenu.style.display = "none";
        gameArea.style.display = "flex";

        // Afficher le bouton changer de thème
        changeThemeBtn.style.display = "inline-block";

        startGame();
    }
});

/* ===== DEMARRER UNE PARTIE ===== */
function startGame(){
    message.textContent = "";
    nextBtn.style.display = "none";

    buttons.forEach(btn=>{
        btn.classList.remove("good","bad","click-anim");
        btn.disabled=false;
        btn.style.background = "linear-gradient(45deg,#ffffff,#f1f3f5)";
        btn.style.color = "black";
    });

    // fruit correct aléatoire dans le thème
    correctFruit = currentFruit[Math.floor(Math.random() * currentFruit.length)];
    fruitImg.src = correctFruit.img;

    // Créer liste de réponses
    let choices = [correctFruit];

    // Mélanger les fruit du thème
    let shuffled = [...currentFruit].sort(() => Math.random() - 0.5);

    // Ajouter 2 faux fruit différents
    shuffled.forEach(a => {
        if(choices.length < 3 && a !== correctFruit){
            choices.push(a);
        }
    });

    // Mélanger les réponses finales
    choices = shuffle(choices);

    buttons.forEach((btn,i)=>{
        btn.textContent = choices[i].name;
        btn.onclick = ()=>checkAnswer(btn, choices[i]);
    });
}


/* ===== CHECK REPONSE ===== */
function checkAnswer(btn, fruit){
    btn.classList.add("click-anim");
    if(fruit === correctFruit){
        btn.style.background = "#69db7c";
        btn.style.color = "#fff";
        message.textContent = "🎉 Bravo ! Bonne réponse !";
        nextBtn.style.display = "inline-block";

        buttons.forEach(b=>{
            if(b !== btn) {
                b.style.background = "#ff6b6b";
                b.style.color = "#fff";
                b.disabled = true;
            } else b.disabled = true;
        });
    } else {
        btn.style.background = "#ff6b6b";
        btn.style.color = "#fff";
        btn.disabled = true;
        message.textContent = "❌ Essaie encore !";
    }
}

/* ===== BOUTONS ===== */
nextBtn.onclick = startGame;

changeThemeBtn.onclick = () => {
    gameArea.style.display = "none";
    themeMenu.style.display = "flex";
    changeThemeBtn.style.display = "none";

    // Remettre le fond initial
    document.body.style.background = "linear-gradient(135deg,#caffbf, #9bf6a0, #52b788)";
};

goHomeBtn.onclick = () => {
    window.location.href = "../Accueil/Accueil.html";
};

// TRAÎNÉE ARC-EN-CIEL FLUIDE LÉGÈRE
const trailCanvas = document.createElement("canvas");
trailCanvas.style.position = "fixed";
trailCanvas.style.top = "0";
trailCanvas.style.left = "0";
trailCanvas.style.pointerEvents = "none";
trailCanvas.style.zIndex = "9999";
document.body.appendChild(trailCanvas);

const ctx = trailCanvas.getContext("2d");
let width = window.innerWidth;
let height = window.innerHeight;
trailCanvas.width = width;
trailCanvas.height = height;

window.addEventListener("resize", () => {
    width = window.innerWidth;
    height = window.innerHeight;
    trailCanvas.width = width;
    trailCanvas.height = height;
});

let mouseX = width/2;
let mouseY = height/2;
let lastMove = Date.now();

document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    lastMove = Date.now();
});

const trail = [];
const maxTrail = 10; // moins de points => traînée plus courte

function animateTrailCanvas() {
    ctx.clearRect(0,0,width,height);

    // ajoute la nouvelle position
    trail.push({x: mouseX, y: mouseY, time: Date.now()});
    if(trail.length > maxTrail) trail.shift();

    for(let i=0; i<trail.length-1; i++){
        const p = trail[i];
        const next = trail[i+1];
        const alpha = 0.8 * (1 - i / trail.length); // plus subtil

        const hue = (i*30 + Date.now()/10)%360;
        ctx.strokeStyle = `hsla(${hue},100%,60%,${alpha})`;
        ctx.lineWidth = 6*(alpha); 

        // effet de flou léger
        ctx.shadowBlur = 8;
        ctx.shadowColor = ctx.strokeStyle;

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(next.x, next.y);
        ctx.stroke();
    }

    // efface si souris immobile > 300ms
    if(Date.now() - lastMove > 300){
        trail.length = 0;
    }

    requestAnimationFrame(animateTrailCanvas);
}

animateTrailCanvas();

</script>
</body>
</html>
