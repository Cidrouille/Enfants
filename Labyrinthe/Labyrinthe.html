<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Labyrinthe</title>
<link rel="stylesheet" href="Labyrinthe.css">
</head>
<body>

<div class="background">
    <!-- Bulles -->
    <span class="bubble" style="--size:30px; --left:10%; --duration:12s;"></span>
    <span class="bubble" style="--size:50px; --left:70%; --duration:15s;"></span>
    <span class="bubble" style="--size:40px; --left:40%; --duration:18s;"></span>
    <span class="bubble" style="--size:25px; --left:80%; --duration:10s;"></span>

    <!-- Lumières -->
    <span class="lights" style="--size:12px; --left:15%; --duration:8s;"></span>
    <span class="lights" style="--size:10px; --left:45%; --duration:10s;"></span>
    <span class="lights" style="--size:14px; --left:70%; --duration:12s;"></span>
    
    <!-- Etoiles -->
    <span class="star" style="--size:18px; --left:15%; --duration:12s;"></span>
    <span class="star" style="--size:12px; --left:45%; --duration:8s;"></span>
    <span class="star" style="--size:25px; --left:85%; --duration:10s;"></span>
    
    <!-- Lunes -->
    <span class="lune" style="--size:18px; --left:20%; --duration:10s;"></span>
    <span class="lune" style="--size:12px; --left:50%; --duration:15s;"></span>
    <span class="lune" style="--size:25px; --left:90%; --duration:13s;"></span>
    
    <div class="shooting-star" style="--size:25px; --duration:5s; --start-left:0vw; --start-bottom:65%;">
      <div class="trail"></div>
      <div class="star-shape"></div>
    </div>
    <div class="shooting-star" style="--size:25px; --duration:6s; --start-left:0vw; --start-bottom:10%;">
      <div class="trail"></div>
      <div class="star-shape"></div>
    </div>
    <div class="shooting-star" style="--size:25px; --duration:7s; --start-left:50vw; --start-bottom:0%;">
      <div class="trail"></div>
      <div class="star-shape"></div>
    </div>
    
    <div id="cursor-trail"></div>
</div>

<header>
    <div class="header-left">
        <button id="goHomeBtn">Changer de jeu</button>
    </div>
    <h1>
        <span class="emoji">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
                <defs>
                    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#eeeeee"/>
                        <stop offset="25%" stop-color="#bbbbbb"/>
                        <stop offset="50%" stop-color="#ffffff"/>
                        <stop offset="75%" stop-color="#aaaaaa"/>
                        <stop offset="100%" stop-color="#eeeeee"/>
                    </linearGradient>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <rect x="5" y="5" width="90" height="90" rx="15" fill="url(#metal)" filter="url(#shadow)"/>
                <path d="
                    M20 20 H80
                    M80 20 V80
                    M80 80 H20
                    M20 80 V35
                    M20 35 H65
                    M65 35 V65
                    M65 65 H35
                    M35 65 V50
                    M35 50 H55
                "
                stroke="#333" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="20" cy="20" r="4" fill="#4CAF50"/>
                <circle cx="55" cy="50" r="4" fill="#FF5252"/>
            </svg>
        </span>
        <span class="title-text">Labyrinthe</span>
    </h1>
</header>

<div id="game-container"></div>
<div id="message" style="text-align:center; margin-top:10px; font-size:1.2rem; font-weight:bold; color:#4CAF50;"></div>

<script>
/* --- CONFIGURATION --- */
const rows = 15;
const cols = 20;
const cellSize = 30;

const container = document.getElementById("game-container");
container.style.position = "relative";
container.style.width = cols*cellSize + "px";
container.style.height = rows*cellSize + "px";
container.style.border = "3px solid #333";
container.style.margin = "20px auto";
container.style.background = "#f8f9ff";

let maze = [];
let cells = [];
let playerPos;
let start, end;

/* --- GÉNÉRATION DU LABYRINTHE ALÉATOIRE --- */
function generateMaze() {
    maze = Array.from({length: rows}, () => Array(cols).fill(1));
    start = [Math.floor(Math.random()*rows), 0];
    maze[start[0]][start[1]] = 0;

    const stack = [start.slice()];

    while(stack.length){
        let [r,c] = stack[stack.length-1];
        let dirs = [[0,1],[1,0],[0,-1],[-1,0]].sort(()=>Math.random()-0.5);
        let moved = false;
        for(let [dr,dc] of dirs){
            let nr = r + dr*2;
            let nc = c + dc*2;
            if(nr>=0 && nr<rows && nc>=0 && nc<cols && maze[nr][nc]===1){
                maze[r+dr][c+dc] = 0;
                maze[nr][nc] = 0;
                stack.push([nr,nc]);
                moved = true;
                break;
            }
        }
        if(!moved) stack.pop();
    }

    chooseEnd();
}

function chooseEnd(){
    // On veut une cellule ouverte dans la dernière colonne
    let candidates = [];
    for(let r=0; r<rows; r++){
        if(maze[r][cols-2] === 0) candidates.push(r); // cellule à côté de la dernière colonne
    }

    let endRow;
    if(candidates.length > 0){
        endRow = candidates[Math.floor(Math.random()*candidates.length)];
    } else {
        // Si pas de passage à côté, forcer un mur à devenir passage
        endRow = Math.floor(Math.random()*rows);
        maze[endRow][cols-2] = 0;
    }

    end = [endRow, cols-1];
    maze[end[0]][end[1]] = 0; // fin accessible
}

/* --- CRÉER LE LABYRINTHE DANS LE DOM --- */
function createMazeDOM() {
    // Vider le conteneur complètement sauf le joueur
    Array.from(container.children).forEach(child => {
        if(child !== player) child.remove();
    });

    cells = [];

    for(let r=0;r<rows;r++){
        cells[r] = [];
        for(let c=0;c<cols;c++){
            const div = document.createElement("div");
            div.style.position = "absolute";
            div.style.left = c*cellSize+"px";
            div.style.top = r*cellSize+"px";
            div.style.width = cellSize+"px";
            div.style.height = cellSize+"px";
            div.style.boxSizing = "border-box";
            // Mur = #333, passage = #f8f9ff
            div.style.background = maze[r][c]===1?"#333":"#f8f9ff";
            // Marquer le départ et l'arrivée
            if(r===start[0] && c===start[1]) div.style.background = "#B0B0B0"; // départ gris clair
            if(r===end[0] && c===end[1]) div.style.background = "#4CAF50"; // arrivée verte
            container.appendChild(div);
            cells[r][c] = div;
        }
    }

    // Replacer le joueur exactement sur start
    playerX = start[1]*cellSize + cellSize*0.2;
    playerY = start[0]*cellSize + cellSize*0.2;
    player.style.left = playerX + "px";
    player.style.top = playerY + "px";

    playerPos = [...start]; // mise à jour logique
}
function createMazeDOM() {
    // Vider le conteneur complètement sauf le joueur
    Array.from(container.children).forEach(child => {
        if(child !== player) child.remove();
    });

    cells = [];

    for(let r=0;r<rows;r++){
        cells[r] = [];
        for(let c=0;c<cols;c++){
            const div = document.createElement("div");
            div.style.position = "absolute";
            div.style.left = c*cellSize+"px";
            div.style.top = r*cellSize+"px";
            div.style.width = cellSize+"px";
            div.style.height = cellSize+"px";
            div.style.boxSizing = "border-box";
            // Mur = #333, passage = #f8f9ff
            div.style.background = maze[r][c]===1?"#333":"#f8f9ff";
            // Marquer le départ et l'arrivée
            if(r===start[0] && c===start[1]) div.style.background = "#B0B0B0"; // départ gris clair
            if(r===end[0] && c===end[1]) div.style.background = "#4CAF50"; // arrivée verte
            container.appendChild(div);
            cells[r][c] = div;
        }
    }

    // Replacer le joueur exactement sur start
    playerX = start[1]*cellSize + cellSize*0.2;
    playerY = start[0]*cellSize + cellSize*0.2;
    player.style.left = playerX + "px";
    player.style.top = playerY + "px";

    playerPos = [...start]; // mise à jour logique
}
/* --- JOUEUR --- */
const player = document.createElement("div");
player.style.position = "absolute";
player.style.width = cellSize*0.6 + "px";
player.style.height = cellSize*0.6 + "px";
player.style.background = "red";
player.style.borderRadius = "50%";
player.style.zIndex = "10";
container.appendChild(player);

function updatePlayer(){
    player.style.left = playerPos[1]*cellSize + cellSize*0.2 + "px";
    player.style.top = playerPos[0]*cellSize + cellSize*0.2 + "px";
}

/* --- NOUVEAU NIVEAU --- */
function startNewLevel(){
    generateMaze();
    createMazeDOM();
}

/* --- NOUVEAU DÉPLACEMENT FLUIDE --- */
const keys = {ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false};
const speed = 300; // pixels par seconde

document.addEventListener("keydown", e => {
    if(keys.hasOwnProperty(e.key)) keys[e.key] = true;
});
document.addEventListener("keyup", e => {
    if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
});

let playerX, playerY; // position en pixels

function startNewLevelWithPlayerPosition(){
    startNewLevel();
}

function animatePlayer(time){
    if(!animatePlayer.lastTime) animatePlayer.lastTime = time;
    const delta = (time - animatePlayer.lastTime)/1000;
    animatePlayer.lastTime = time;

    let dx = 0, dy = 0;
    if(keys.ArrowUp) dy -= speed*delta;
    if(keys.ArrowDown) dy += speed*delta;
    if(keys.ArrowLeft) dx -= speed*delta;
    if(keys.ArrowRight) dx += speed*delta;

    // Nouvelle position
    let newX = playerX + dx;
    let newY = playerY + dy;

    const playerSize = cellSize*0.6;

    // Vérifier collisions avec murs (4 coins)
    function isFree(x, y){
        const col = Math.floor(x/cellSize);
        const row = Math.floor(y/cellSize);
        return row>=0 && row<rows && col>=0 && col<cols && maze[row][col]===0;
    }

	// Mouvement horizontal
	let tempX = playerX + dx;
	if(isFree(tempX, playerY) && isFree(tempX + playerSize, playerY) &&
	   isFree(tempX, playerY + playerSize) && isFree(tempX + playerSize, playerY + playerSize)){
		playerX = tempX;
	}

	// Mouvement vertical
	let tempY = playerY + dy;
	if(isFree(playerX, tempY) && isFree(playerX + playerSize, tempY) &&
	   isFree(playerX, tempY + playerSize) && isFree(playerX + playerSize, tempY + playerSize)){
		playerY = tempY;
	}

	// Mettre à jour le style du joueur
	player.style.left = playerX + "px";
	player.style.top = playerY + "px";

    // Vérifier si arrivé à la sortie
    const centerCol = Math.floor((playerX + playerSize/2)/cellSize);
    const centerRow = Math.floor((playerY + playerSize/2)/cellSize);
    if(centerRow===end[0] && centerCol===end[1]){
		const messageDiv = document.getElementById("message");
		messageDiv.textContent = "🎉 Bravo ! Niveau terminé !";

		// Bloquer les touches pour éviter que le joueur bouge
		Object.keys(keys).forEach(k => keys[k] = false);

		// Bloquer temporairement animatePlayer
		animatePlayer.stopped = true;

		// Après 2 secondes, on démarre un nouveau niveau
		setTimeout(() => {
			messageDiv.textContent = "";
			startNewLevelWithPlayerPosition();
			animatePlayer.stopped = false; // on relance l'animation
			requestAnimationFrame(animatePlayer); // relance la boucle d'animation
		}, 2000);

    return; // sortir de la fonction animatePlayer pour ce frame
}

    requestAnimationFrame(animatePlayer);
}

startNewLevelWithPlayerPosition();
requestAnimationFrame(animatePlayer);

/* --- BOUTON ACCUEIL --- */
document.getElementById("goHomeBtn").onclick = ()=>{
    window.location.href = "../Accueil/Accueil.html";
};

/* --- TRAÎNÉE ARC-EN-CIEL --- */
const trailCanvas = document.createElement("canvas");
trailCanvas.style.position = "fixed";
trailCanvas.style.top="0";
trailCanvas.style.left="0";
trailCanvas.style.pointerEvents="none";
trailCanvas.style.zIndex="9999";
document.body.appendChild(trailCanvas);

const ctx = trailCanvas.getContext("2d");
let width=window.innerWidth, height=window.innerHeight;
trailCanvas.width = width;
trailCanvas.height = height;

window.addEventListener("resize", ()=>{
    width=window.innerWidth;
    height=window.innerHeight;
    trailCanvas.width = width;
    trailCanvas.height = height;
});

let mouseX=width/2, mouseY=height/2, lastMove=Date.now();
document.addEventListener("mousemove", e=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
    lastMove=Date.now();
});

const trail = [];
const maxTrail=10;

function animateTrailCanvas(){
    ctx.clearRect(0,0,width,height);
    trail.push({x:mouseX,y:mouseY,time:Date.now()});
    if(trail.length>maxTrail) trail.shift();

    for(let i=0;i<trail.length-1;i++){
        const p = trail[i];
        const next = trail[i+1];
        const alpha = 0.8*(1-i/trail.length);
        const hue = (i*30 + Date.now()/10)%360;
        ctx.strokeStyle = `hsla(${hue},100%,60%,${alpha})`;
        ctx.lineWidth = 6*alpha;
        ctx.shadowBlur=8;
        ctx.shadowColor=ctx.strokeStyle;
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(next.x,next.y);
        ctx.stroke();
    }

    if(Date.now()-lastMove>300) trail.length=0;
    requestAnimationFrame(animateTrailCanvas);
}
animateTrailCanvas();

/* --- INITIALISATION --- */
startNewLevel();

</script>

</body>
</html>
